<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/images/dicd-logo.png">
    <title>Admin Dashboard - DICD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center hover:opacity-80 transition-opacity">
                    <img src="/static/images/dicd-logo.png" alt="DICD Logo" class="h-10 sm:h-12 mr-2 sm:mr-3">
                    <span class="font-bold text-base sm:text-lg md:text-xl text-gray-800 hidden sm:inline">DICD Admin Panel</span>
                </a>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <span id="user-name" class="text-gray-700 text-sm sm:text-base hidden md:inline"></span>
                    <button onclick="logout()" class="bg-red-500 text-white px-3 sm:px-4 py-2 rounded-lg hover:bg-red-600 text-sm sm:text-base">
                        <i class="fas fa-sign-out-alt sm:mr-2"></i><span class="hidden sm:inline">Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-6 md:py-8">
        <h1 class="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8">Admin Dashboard</h1>

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6 mb-6 sm:mb-8">
            <div class="bg-white rounded-lg shadow p-4 sm:p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-xs sm:text-sm">Total Students</p>
                        <p id="stat-students" class="text-xl sm:text-2xl md:text-3xl font-bold text-purple-600">0</p>
                    </div>
                    <i class="fas fa-users text-2xl sm:text-3xl md:text-4xl text-purple-200"></i>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 sm:p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-xs sm:text-sm">Total Courses</p>
                        <p id="stat-courses" class="text-xl sm:text-2xl md:text-3xl font-bold text-blue-600">0</p>
                    </div>
                    <i class="fas fa-book text-2xl sm:text-3xl md:text-4xl text-blue-200"></i>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 sm:p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-xs sm:text-sm">Enrollments</p>
                        <p id="stat-enrollments" class="text-xl sm:text-2xl md:text-3xl font-bold text-green-600">0</p>
                    </div>
                    <i class="fas fa-clipboard-check text-2xl sm:text-3xl md:text-4xl text-green-200"></i>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Instructors</p>
                        <p id="stat-instructors" class="text-3xl font-bold text-orange-600">0</p>
                    </div>
                    <i class="fas fa-chalkboard-teacher text-4xl text-orange-200"></i>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="mb-6 border-b border-gray-200">
            <nav class="-mb-px flex space-x-8">
                <button onclick="showTab('courses')" id="tab-courses" 
                        class="tab-btn border-b-2 border-purple-600 text-purple-600 py-4 px-1 font-medium">
                    Courses
                </button>
                <button onclick="showTab('users')" id="tab-users" 
                        class="tab-btn border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 py-4 px-1 font-medium">
                    Users
                </button>
                <button onclick="showTab('contacts')" id="tab-contacts" 
                        class="tab-btn border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 py-4 px-1 font-medium">
                    Contact Messages
                </button>
                <button onclick="showTab('adoptions')" id="tab-adoptions" 
                        class="tab-btn border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 py-4 px-1 font-medium">
                    Adoptions
                </button>
            </nav>
        </div>

        <!-- Courses Tab -->
        <div id="content-courses" class="tab-content">
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Manage Courses</h2>
                    <button onclick="showAddCourseForm()" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">
                        <i class="fas fa-plus mr-2"></i>Add New Course
                    </button>
                </div>
                <div id="courses-list"></div>
            </div>
            
            <!-- Add Course Modal -->
            <div id="add-course-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
                <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold">Add New Course</h3>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <form id="add-course-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Title</label>
                            <input id="course-title" type="text" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Description</label>
                            <textarea id="course-description" rows="3" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Category</label>
                            <select id="course-category" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
                                <option value="sign_language">Sign Language</option>
                                <option value="braille">Braille Literacy</option>
                                <option value="autism_therapy">Autism Therapy</option>
                                <option value="ecd">Early Childhood Development</option>
                                <option value="inclusive_education">Inclusive Education</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Duration (weeks)</label>
                            <input id="course-duration" type="number" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
                        </div>
                        <button type="submit" class="w-full bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">
                            Create Course
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Users Tab -->
        <div id="content-users" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-4">All Users</h2>
                <div id="users-list"></div>
            </div>
        </div>

        <!-- Contacts Tab -->
        <div id="content-contacts" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-4">Contact Messages</h2>
                <div id="contacts-list"></div>
            </div>
        </div>

        <!-- Adoptions Tab -->
        <div id="content-adoptions" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-4">Adopt a Learner Program</h2>
                <div id="adoptions-list"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        let currentUser = null

        async function checkAuth() {
            try {
                const response = await axios.get('/api/auth/me')
                currentUser = response.data.user
                document.getElementById('user-name').textContent = currentUser.full_name
                if (currentUser.role !== 'admin') {
                    alert('Access denied. Admin only.')
                    window.location.href = '/'
                }
            } catch (error) {
                window.location.href = '/login'
            }
        }

        async function logout() {
            await axios.post('/api/auth/logout')
            window.location.href = '/login'
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'))
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('border-purple-600', 'text-purple-600')
                el.classList.add('border-transparent', 'text-gray-500')
            })
            
            document.getElementById('content-' + tabName).classList.remove('hidden')
            document.getElementById('tab-' + tabName).classList.remove('border-transparent', 'text-gray-500')
            document.getElementById('tab-' + tabName).classList.add('border-purple-600', 'text-purple-600')

            if (tabName === 'courses') loadCourses()
            if (tabName === 'users') loadUsers()
            if (tabName === 'contacts') loadContacts()
            if (tabName === 'adoptions') loadAdoptions()
        }

        async function loadStats() {
            try {
                const response = await axios.get('/api/admin/stats')
                document.getElementById('stat-students').textContent = response.data.students
                document.getElementById('stat-courses').textContent = response.data.courses
                document.getElementById('stat-enrollments').textContent = response.data.enrollments
                document.getElementById('stat-instructors').textContent = response.data.instructors
            } catch (error) {
                console.error('Failed to load stats', error)
            }
        }

        async function loadCourses() {
            try {
                const response = await axios.get('/api/courses?status=')
                const courses = response.data.courses
                
                const html = courses.map(course => `
                    <div class="border-b py-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg">${course.title}</h3>
                                <p class="text-gray-600 text-sm">${course.description || ''}</p>
                                <div class="mt-2 text-sm">
                                    <span class="bg-purple-100 text-purple-800 px-2 py-1 rounded">${course.category}</span>
                                    <span class="ml-2 text-gray-500">${course.duration_weeks} weeks</span>
                                    <span class="ml-2 text-gray-500">Status: ${course.status}</span>
                                </div>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="editCourse(${course.id})" class="text-blue-600 hover:text-blue-800">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteCourse(${course.id})" class="text-red-600 hover:text-red-800">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('')
                
                document.getElementById('courses-list').innerHTML = html || '<p class="text-gray-500">No courses found</p>'
            } catch (error) {
                console.error('Failed to load courses', error)
            }
        }

        async function loadUsers() {
            try {
                const response = await axios.get('/api/admin/users')
                const users = response.data.users
                
                const html = `
                    <table class="min-w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-2 text-left">Name</th>
                                <th class="px-4 py-2 text-left">Email</th>
                                <th class="px-4 py-2 text-left">Role</th>
                                <th class="px-4 py-2 text-left">Phone</th>
                                <th class="px-4 py-2 text-left">Joined</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr class="border-b">
                                    <td class="px-4 py-2">${user.full_name}</td>
                                    <td class="px-4 py-2">${user.email}</td>
                                    <td class="px-4 py-2">
                                        <span class="px-2 py-1 text-xs rounded ${getRoleBadgeClass(user.role)}">${user.role}</span>
                                    </td>
                                    <td class="px-4 py-2">${user.phone || '-'}</td>
                                    <td class="px-4 py-2">${new Date(user.created_at).toLocaleDateString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `
                
                document.getElementById('users-list').innerHTML = html
            } catch (error) {
                console.error('Failed to load users', error)
            }
        }

        async function loadContacts() {
            try {
                const response = await axios.get('/api/admin/contacts')
                const messages = response.data.messages
                
                const html = messages.map(msg => `
                    <div class="border-b py-4">
                        <div class="flex justify-between">
                            <div>
                                <h3 class="font-bold">${msg.name}</h3>
                                <p class="text-sm text-gray-600">${msg.email} | ${msg.phone || 'No phone'}</p>
                                ${msg.subject ? `<p class="text-sm font-medium mt-1">Subject: ${msg.subject}</p>` : ''}
                                <p class="mt-2">${msg.message}</p>
                                <p class="text-xs text-gray-500 mt-2">${new Date(msg.created_at).toLocaleString()}</p>
                            </div>
                            <span class="px-2 py-1 h-6 text-xs rounded ${msg.status === 'new' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">${msg.status}</span>
                        </div>
                    </div>
                `).join('')
                
                document.getElementById('contacts-list').innerHTML = html || '<p class="text-gray-500">No messages</p>'
            } catch (error) {
                console.error('Failed to load contacts', error)
            }
        }

        async function loadAdoptions() {
            try {
                const response = await axios.get('/api/admin/adoptions')
                const adoptions = response.data.adoptions
                
                const html = adoptions.map(adoption => `
                    <div class="border-b py-4">
                        <div class="flex justify-between">
                            <div>
                                <h3 class="font-bold">${adoption.sponsor_name}</h3>
                                <p class="text-sm text-gray-600">${adoption.sponsor_email} | ${adoption.sponsor_phone || 'No phone'}</p>
                                <p class="mt-1"><strong>Student:</strong> ${adoption.student_name} (${adoption.student_email})</p>
                                <p><strong>Amount:</strong> MWK ${adoption.amount} - ${adoption.frequency}</p>
                                <p class="text-xs text-gray-500 mt-2">Started: ${new Date(adoption.start_date).toLocaleDateString()}</p>
                                ${adoption.notes ? `<p class="text-sm mt-1 italic">${adoption.notes}</p>` : ''}
                            </div>
                            <span class="px-2 py-1 h-6 text-xs rounded ${adoption.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">${adoption.status}</span>
                        </div>
                    </div>
                `).join('')
                
                document.getElementById('adoptions-list').innerHTML = html || '<p class="text-gray-500">No adoptions yet</p>'
            } catch (error) {
                console.error('Failed to load adoptions', error)
            }
        }

        function getRoleBadgeClass(role) {
            const classes = {
                admin: 'bg-red-100 text-red-800',
                instructor: 'bg-blue-100 text-blue-800',
                student: 'bg-green-100 text-green-800'
            }
            return classes[role] || 'bg-gray-100 text-gray-800'
        }

        function showAddCourseForm() {
            document.getElementById('add-course-modal').classList.remove('hidden')
        }

        function closeModal() {
            document.getElementById('add-course-modal').classList.add('hidden')
        }

        document.getElementById('add-course-form').addEventListener('submit', async (e) => {
            e.preventDefault()
            try {
                await axios.post('/api/courses', {
                    title: document.getElementById('course-title').value,
                    description: document.getElementById('course-description').value,
                    category: document.getElementById('course-category').value,
                    duration_weeks: document.getElementById('course-duration').value
                })
                alert('Course created successfully!')
                closeModal()
                e.target.reset()
                loadCourses()
                loadStats()
            } catch (error) {
                alert('Failed to create course')
            }
        })

        async function deleteCourse(id) {
            if (!confirm('Are you sure you want to delete this course?')) return
            try {
                await axios.delete(`/api/courses/${id}`)
                alert('Course deleted')
                loadCourses()
                loadStats()
            } catch (error) {
                alert('Failed to delete course')
            }
        }

        // Initialize
        checkAuth().then(() => {
            loadStats()
            loadCourses()
        })
    </script>
</body>
</html>
